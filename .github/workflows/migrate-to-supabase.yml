name: Migrate SQLite -> Supabase

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 pkg-config

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Show Node/npm
        run: node -v && npm -v

      - name: Run schema migrations on Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run migrate:schema-to-supabase

      - name: Run data migration (SQLite -> Supabase)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run migrate:sqlite-to-supabase
